version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      react-next-runtime:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      coss-ui-runtime:
        patterns:
          - "@base-ui/*"
          - tailwindcss
          - "@tailwindcss/*"
          - shadcn
          - class-variance-authority
          - tailwind-merge
      workspace-toolchain:
        patterns:
          - typescript
          - turbo
          - "@biomejs/*"
    labels:
      - dependencies
      - frontend

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:40"
      timezone: Asia/Shanghai
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - container

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - container
