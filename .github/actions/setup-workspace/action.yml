name: Set up Bun workspace
description: Install the pinned Bun toolchain and the frozen workspace lockfile.

runs:
  using: composite
  steps:
    - name: Set up Bun 1.3.1
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.1

    - name: Install frozen workspace dependencies
      shell: bash
      run: bun install --frozen-lockfile
