name: dependency-health

on:
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-health:
    name: scheduled dependency health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-workspace
      - name: Record available workspace updates
        run: |
          mkdir -p artifacts
          bun outdated --recursive | tee artifacts/outdated.txt
      - run: bun run versions:check --report artifacts/versions.json
      - run: bun run security:audit --report artifacts/security-audit.json
      - run: bun run coss:upstream:verify
      - run: >-
          bun run licenses:check
          --output artifacts/fugue-web.cdx.json
          --report artifacts/licenses.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-health-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 30
