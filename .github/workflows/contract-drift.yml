name: contract-drift

on:
  workflow_call:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: authoritative OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fugue-web
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout authoritative Fugue contract
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: yym68686/fugue
          ref: main
          path: .contract-source/fugue
          fetch-depth: 1

      - name: Set up frozen Bun workspace
        uses: ./.github/actions/setup-workspace

      - name: Check authoritative contract drift
        env:
          FUGUE_OPENAPI_SOURCE: ${{ github.workspace }}/.contract-source/fugue/openapi/openapi.yaml
        run: bun run contract:check
