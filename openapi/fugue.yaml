components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    RuntimeBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    EdgeToken:
      type: apiKey
      in: query
      name: token
    DownloadToken:
      type: apiKey
      in: query
      name: download_token
  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      schema:
        type: string
    TenantIdPathParam:
      in: path
      name: tenant_id
      required: true
      schema:
        type: string
    TenantIdQueryParam:
      in: query
      name: tenant_id
      required: false
      schema:
        type: string
    HostnameQueryParam:
      in: query
      name: hostname
      required: false
      schema:
        type: string
    OperationIdQueryParam:
      in: query
      name: operation_id
      required: false
      schema:
        type: string
    TailLinesQueryParam:
      in: query
      name: tail_lines
      required: false
      schema:
        type: integer
        format: int32
    ComponentQueryParam:
      in: query
      name: component
      required: false
      schema:
        type: string
    PodQueryParam:
      in: query
      name: pod
      required: false
      schema:
        type: string
    DepthQueryParam:
      in: query
      name: depth
      required: false
      schema:
        type: integer
        format: int32
    PathQueryParam:
      in: query
      name: path
      required: false
      description: Absolute path inside the selected filesystem scope. Tree requests default to the persistent workspace mount when legacy workspace storage is configured, otherwise to /. Read, write, and delete operations require an explicit file or directory path.
      schema:
        type: string
    FilePathsQueryParam:
      in: query
      name: path
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    MaxBytesQueryParam:
      in: query
      name: max_bytes
      required: false
      schema:
        type: integer
        format: int32
    PreviousQueryParam:
      in: query
      name: previous
      required: false
      schema:
        type: boolean
    RecursiveQueryParam:
      in: query
      name: recursive
      required: false
      schema:
        type: boolean
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
        maxLength: 200
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    StringMap:
      type: object
      additionalProperties:
        type: string
    Tenant:
      type: object
      additionalProperties: false
      required: [id, name, slug, status, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Project:
      type: object
      additionalProperties: false
      required: [id, tenant_id, name, slug, description, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    APIKey:
      type: object
      additionalProperties: false
      required: [id, tenant_id, label, prefix, hash, status, scopes, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        label:
          type: string
        prefix:
          type: string
        hash:
          type: string
        status:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        disabled_at:
          type: string
          format: date-time
    NodeKey:
      type: object
      additionalProperties: false
      required: [id, tenant_id, label, prefix, hash, status, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        label:
          type: string
        prefix:
          type: string
        hash:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    NodeKeyCleanupResult:
      type: object
      additionalProperties: false
      properties:
        deleted_cluster_nodes:
          type: array
          items:
            type: string
        deleted_bootstrap_token_ids:
          type: array
          items:
            type: string
        detached_runtime_ids:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    ResourceSpec:
      type: object
      additionalProperties: false
      properties:
        cpu_millicores:
          type: integer
          format: int64
        memory_mebibytes:
          type: integer
          format: int64
    BillingResourceSpec:
      type: object
      additionalProperties: false
      properties:
        cpu_millicores:
          type: integer
          format: int64
        memory_mebibytes:
          type: integer
          format: int64
        storage_gibibytes:
          type: integer
          format: int64
    ResourceUsage:
      type: object
      additionalProperties: false
      properties:
        cpu_millicores:
          type: integer
          format: int64
        memory_bytes:
          type: integer
          format: int64
        ephemeral_storage_bytes:
          type: integer
          format: int64
    BillingPriceBook:
      type: object
      additionalProperties: false
      required:
        [currency, hours_per_month, cpu_microcents_per_millicore_hour, memory_microcents_per_mib_hour, storage_microcents_per_gib_hour]
      properties:
        currency:
          type: string
        hours_per_month:
          type: integer
          format: int64
        cpu_microcents_per_millicore_hour:
          type: integer
          format: int64
        memory_microcents_per_mib_hour:
          type: integer
          format: int64
        storage_microcents_per_gib_hour:
          type: integer
          format: int64
    TenantBillingEvent:
      type: object
      additionalProperties: false
      required:
        [id, tenant_id, type, amount_microcents, balance_after_microcents, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        type:
          type: string
        amount_microcents:
          type: integer
          format: int64
        balance_after_microcents:
          type: integer
          format: int64
        metadata:
          $ref: "#/components/schemas/StringMap"
        created_at:
          type: string
          format: date-time
    TenantBillingSummary:
      type: object
      additionalProperties: false
      required:
        [
          tenant_id,
          status,
          byo_vps_free,
          over_cap,
          balance_restricted,
          managed_cap,
          managed_committed,
          managed_available,
          default_app_resources,
          default_postgres_resources,
          price_book,
          hourly_rate_microcents,
          monthly_estimate_microcents,
          balance_microcents,
          last_accrued_at,
          updated_at,
          events
        ]
      properties:
        tenant_id:
          type: string
        status:
          type: string
        status_reason:
          type: string
        byo_vps_free:
          type: boolean
        over_cap:
          type: boolean
        balance_restricted:
          type: boolean
        managed_cap:
          $ref: "#/components/schemas/BillingResourceSpec"
        managed_committed:
          $ref: "#/components/schemas/BillingResourceSpec"
        managed_available:
          $ref: "#/components/schemas/BillingResourceSpec"
        current_usage:
          $ref: "#/components/schemas/ResourceUsage"
        default_app_resources:
          $ref: "#/components/schemas/BillingResourceSpec"
        default_postgres_resources:
          $ref: "#/components/schemas/BillingResourceSpec"
        price_book:
          $ref: "#/components/schemas/BillingPriceBook"
        hourly_rate_microcents:
          type: integer
          format: int64
        monthly_estimate_microcents:
          type: integer
          format: int64
        balance_microcents:
          type: integer
          format: int64
        runway_hours:
          type: number
          format: double
        last_accrued_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        events:
          type: array
          items:
            $ref: "#/components/schemas/TenantBillingEvent"
    AppSource:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
        repo_url:
          type: string
