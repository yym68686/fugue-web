openapi: 3.1.0
info:
  title: Fugue API
  version: 1.0.0
  description: |-
    Authoritative API contract for Fugue.
    Route registration, served OpenAPI artifacts, and generated checks all derive from this file.
servers:
  - url: /
tags:
  - name: System
    description: Health checks, install helpers, and contract endpoints.
  - name: Edge
    description: Edge integration and TLS automation endpoints.
  - name: Tenants
    description: Tenant lifecycle endpoints.
  - name: Projects
    description: Project management endpoints.
  - name: Console
    description: Console-specific gallery, detail, and change-stream endpoints.
  - name: Billing
    description: Tenant billing and managed-cap endpoints.
  - name: API Keys
    description: API credential lifecycle endpoints.
  - name: Node Keys
    description: Reusable node-key management endpoints.
  - name: Cluster
    description: Cluster inventory endpoints.
  - name: Nodes
    description: Compatibility and bootstrap node endpoints.
  - name: Runtimes
    description: Runtime inventory and sharing endpoints.
  - name: Backing Services
    description: Backing service and binding endpoints.
  - name: Apps
    description: Application deployment, config, logs, filesystem, and import endpoints.
  - name: Templates
    description: Template metadata inspection endpoints.
  - name: Operations
    description: Async operation endpoints.
  - name: Audit Events
    description: Audit-log endpoints.
  - name: Source Uploads
    description: Source upload archive endpoints.
  - name: Agent
    description: Runtime agent control-plane endpoints.
paths:
  /button.svg:
    get:
      operationId: getDeployButton
      summary: Get Deploy Button
      tags: [System]
      x-fugue-handler: handleButtonSVG
      responses:
        '200':
          description: Successful response
          content:
            image/svg+xml:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ErrorResponse"
  /healthz:
