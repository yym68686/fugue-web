      tags: [Data Workspaces]
      x-fugue-handler: handlePutDataBlob
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: sha256
          required: true
          schema:
            type: string
        - in: query
          name: transfer_id
          required: true
          schema:
            type: string
          description: Planned upload transfer that authorizes this blob write.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: "#/components/responses/ErrorResponse"
