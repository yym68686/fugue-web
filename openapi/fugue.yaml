  /v1/edge/nodes/{edge_id}/quality:
    get:
      operationId: getEdgeNodeQuality
      summary: Get Edge Node Quality
      tags: [Edge]
      x-fugue-handler: handleGetEdgeNodeQuality
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: edge_id
          required: true
          schema:
            type: string
        - in: query
          name: since
          required: false
          description: Lower bound as a positive duration such as 24h or an RFC3339 timestamp. Defaults to 24h.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeNodeQualityResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/edge/quality-rank/{hostname}:
    get:
      operationId: getEdgeQualityRank
      summary: Get Edge Quality Rank
      tags: [Edge]
      x-fugue-handler: handleGetEdgeQualityRank
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: hostname
          required: true
          schema:
            type: string
        - in: query
          name: traffic_class
          required: false
          schema:
            type: string
        - in: query
          name: request_size_class
          required: false
          description: Request body size class used for body-read quality ranking. Accepted values include no_body, body_le_64k, body_64k_1m, body_1m_16m, and body_gt_16m.
          schema:
            type: string
        - in: query
          name: method
          required: false
          schema:
            type: string
        - in: query
          name: path_prefix
          required: false
          schema:
            type: string
        - in: query
          name: scope
          required: false
          description: "Scope selector: global, country:<country>, region:<country>:<region>, or asn:<asn>."
          schema:
            type: string
        - in: query
          name: window
          required: false
          description: Positive duration such as 30m, 6h, or 24h. Defaults to 30m.
          schema:
            type: string
        - in: query
          name: since
          required: false
          description: Lower bound as a positive duration or RFC3339 timestamp. Overrides window.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeQualityRankResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
