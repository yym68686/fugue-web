        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      operationId: deleteProject
      summary: Delete Project
      tags: [Projects]
      x-fugue-handler: handleDeleteProject
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPathParam"
        - in: query
          name: cascade
          required: false
          description: When true, queue delete operations for every app in the project, remove any remaining unbound backing services, and delete the project automatically once the last resource is gone.
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDeleteResponse"
        '202':
          description: Delete requested and cleanup queued
          content:
