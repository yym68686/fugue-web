  /v1/search:
    get:
      operationId: searchResources
      summary: Search Resources
      tags: [Discovery]
      x-fugue-handler: handleSearchResources
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: types
          required: false
          description: Comma-separated resource kinds to search. Defaults to tenant, project, app, domain, service, runtime, operation.
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successful response
          content:
            application/json:
