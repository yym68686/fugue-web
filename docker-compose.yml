services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-fugue}:${POSTGRES_PASSWORD:-fugue}@postgres:5432/${POSTGRES_DB:-fugue}}
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fugue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fugue}
      POSTGRES_DB: ${POSTGRES_DB:-fugue}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-fugue}\" -d \"$${POSTGRES_DB:-fugue}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - fugue_web_postgres:/var/lib/postgresql/data

volumes:
  fugue_web_postgres:
