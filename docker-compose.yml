services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_BASE_URL: ${NEXT_PUBLIC_APP_BASE_URL:-http://localhost:3000}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      WORKSPACE_STORE_SECRET: ${WORKSPACE_STORE_SECRET:-}
      CREEM_PRODUCT_ID: ${CREEM_PRODUCT_ID:-}
      CREEM_API_KEY: ${CREEM_API_KEY:-}
      CREEM_WEBHOOK_SECRET: ${CREEM_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED}
      FUGUE_API_URL: ${FUGUE_API_URL}
      FUGUE_BOOTSTRAP_KEY: ${FUGUE_BOOTSTRAP_KEY}
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - fugue_web_postgres:/var/lib/postgresql/data

volumes:
  fugue_web_postgres:
