# /

- main:
  - text: managed first / owned runtime later
  - heading "Ship on Fugue, then move the same app to your own server." [level=1]
  - paragraph: Import from GitHub, a Docker image, or a local upload. Fugue starts it on shared managed runtime and keeps the route, env, logs, files, images, and migration surface in one console.
  - link "Get started":
    - /url: /new/repository
  - link "Read docs":
    - /url: /docs
  - heading "Deployment graph" [level=2]
  - text: The product panel keeps the first workflow visible. Source
  - strong: GitHub
  - text: Runtime
  - strong: shared
  - text: Route
  - strong: public
  - text: Migration
  - strong: ready
  - code: fugue import github owner/repo --port 3000 fugue app logs web --follow fugue runtime migrate web --target <runtime-id>
  - text: source
  - strong: GitHub repository
  - paragraph: Connect a repository, choose a branch, authorize private access, and create the first service.
  - text: image
  - strong: Docker image
  - paragraph: Point Fugue at an existing image and keep runtime, env, route, and logs in the same console.
  - text: upload
  - strong: Local upload
  - paragraph: Upload a build artifact before auth and resume the pending deploy after sign-in.
  - strong: Project workbench
  - paragraph: Routes, env, logs, files, images, observability, and settings live with the service.
  - strong: Runtime servers
  - paragraph: Add your own machines, inspect pressure, and move workloads without changing the product model.
  - strong: Capacity and billing
  - paragraph: Prepaid balance, managed envelope, storage, and events are visible from one page.
  - text: Console ready
  - heading "Open the operational surface first." [level=2]
  - paragraph: The app shell, docs shell, auth panels, deploy wizard, and admin pages share the same component foundation.
  - link "Open console":
    - /url: /app

