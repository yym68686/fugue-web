# /docs

- main:
  - text: Docs
  - heading "Operate Fugue from source import to runtime diagnosis." [level=1]
  - paragraph: CLI quick start, import modes, topology rules, billing boundaries, migration, failover, inspection, and diagnosis.
  - link "Start deploy":
    - /url: /new/repository
  - group:
    - navigation "On this page":
      - list:
        - listitem:
          - link "CLI quick start":
            - /url: "#quickstart"
        - listitem:
          - link "Import modes":
            - /url: "#imports"
        - listitem:
          - link "fugue.yaml topology":
            - /url: "#topology"
        - listitem:
          - link "Inspect and diagnose":
            - /url: "#diagnose"
  - heading "CLI quick start" [level=2]
  - paragraph: Install Fugue, authenticate, and import a service from a repository, image, or local upload.
  - text: CLI
  - code: fugue login fugue import github owner/repo --port 3000 fugue app logs web --follow
  - status
  - button "Copy command"
  - link "Open console":
    - /url: /app
  - heading "Import modes" [level=2]
  - paragraph: GitHub repository, Docker image, and local upload all create the same project/service graph.
  - text: CLI
  - code: fugue import image registry.example.com/team/web:latest --name web fugue import upload ./dist --name static-site
  - status
  - button "Copy command"
  - link "Open console":
    - /url: /app
  - heading "fugue.yaml topology" [level=2]
  - paragraph: Topology files describe services, routes, backing services, runtime targets, and persistent mounts.
  - text: CLI
  - code: "services: web: port: 3000 route: public db: type: postgres failover: managed"
  - status
  - button "Copy command"
  - link "Open console":
    - /url: /app
  - heading "Inspect and diagnose" [level=2]
  - paragraph: Use inspect and diagnose to compare configured intent against runtime state.
  - text: CLI
  - code: fugue app inspect web fugue app diagnose web --runtime <runtime-id>
  - status
  - button "Copy command"
  - link "Open console":
    - /url: /app
  - heading "Billing and continuity boundaries" [level=2]
  - paragraph: Stateless migrate moves an app service between runtime targets. Managed failover protects backing services that support primary/standby behavior. Both states are visible from the project workbench.

